version: '3.8'

services:
  calculator-hub:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: calculator-hub
    ports:
      - "8000:8000"
    volumes:
      - ./calculators.db:/app/calculators.db
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - calculator-network

networks:
  calculator-network:
    driver: bridge
