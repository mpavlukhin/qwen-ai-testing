version: '3.8'

services:
  calculator-hub:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./calculators.db:/app/calculators.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
